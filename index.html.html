<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlist \u2014 offline playlist curator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b0e13; --dusk:#16202b; --amber:#f2a03d; --ember:#e8623c;
    --mist:#8fa3b8; --paper:#eef2f6; --line:#233242;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(900px 500px at 15% -5%, #1e2c3a 0%, transparent 60%),
      radial-gradient(700px 400px at 95% 10%, #2a2130 0%, transparent 65%),
      var(--ink);
    color:var(--paper);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100vh; padding:36px 18px 80px; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px;margin:0 auto;}
  header{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:24px;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.22em;
    text-transform:uppercase;color:var(--amber);margin:0 0 6px;}
  h1{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(2.6rem,9vw,4.4rem);
    line-height:.9;margin:0 0 10px;}
  h1 em{font-style:normal;color:var(--ember);}
  .lede{color:var(--mist);font-size:.92rem;max-width:54ch;margin:0;}
  label{display:block;font-family:'JetBrains Mono',monospace;font-size:.66rem;
    letter-spacing:.18em;text-transform:uppercase;color:var(--mist);margin-bottom:7px;}
  input[type=text]{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);
    border-radius:4px;color:var(--paper);padding:13px 14px;font-size:1rem;font-family:'Inter',sans-serif;}
  input[type=text]:focus{outline:none;border-color:var(--amber);}
  input::placeholder{color:#5a6b7d;}
  .field{margin-bottom:16px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 18px;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:.68rem;background:rgba(255,255,255,.04);
    border:1px solid var(--line);color:var(--mist);padding:5px 10px;border-radius:999px;cursor:pointer;}
  .chip:hover{border-color:var(--amber);color:var(--amber);}
  .knobs{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
  .knob{flex:1;min-width:150px;}
  .slider-row{display:flex;align-items:center;gap:10px;}
  input[type=range]{flex:1;accent-color:var(--ember);}
  .val{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--amber);
    min-width:60px;text-align:right;}
  button{font-family:'JetBrains Mono',monospace;font-size:.8rem;letter-spacing:.12em;
    text-transform:uppercase;cursor:pointer;border-radius:3px;padding:13px 22px;border:none;
    background:var(--ember);color:#160c08;font-weight:500;}
  button:hover{background:var(--amber);}
  button:active{transform:translateY(1px);}
  button.send{background:#1db954;color:#04140a;}
  button.send:hover{background:#1ed760;}
  .send-note{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--mist);
    margin-top:10px;line-height:1.5;}
  .send-note a{color:var(--amber);}
  button.ghost{background:transparent;color:var(--mist);border:1px solid var(--line);}
  button.ghost:hover{color:var(--paper);border-color:var(--mist);background:transparent;}
  .actions{display:flex;gap:10px;flex-wrap:wrap;}
  #out{margin-top:36px;}
  .playlist-head{display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:4px;gap:16px;}
  .pl-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;margin:0;color:var(--amber);}
  .pl-note{color:var(--mist);font-size:.85rem;margin:6px 0 0;max-width:56ch;}
  .count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--mist);white-space:nowrap;}
  ol{list-style:none;counter-reset:trk;margin:0;padding:0;}
  li.track{counter-increment:trk;display:grid;grid-template-columns:34px 1fr auto;gap:12px;
    align-items:baseline;padding:11px 4px;border-bottom:1px solid rgba(35,50,66,.55);}
  li.track::before{content:counter(trk,decimal-leading-zero);
    font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#4d6070;}
  .t-name{font-weight:600;font-size:.95rem;}
  .t-artist{color:var(--mist);font-size:.85rem;display:block;margin-top:1px;}
  .badge{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.1em;
    text-transform:uppercase;padding:3px 7px;border-radius:2px;white-space:nowrap;}
  .b-core{background:rgba(242,160,61,.14);color:var(--amber);}
  .b-new{background:rgba(232,98,60,.16);color:var(--ember);}
  .status{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--mist);
    padding:26px 0;text-align:center;}
  .err{color:var(--ember);}
  .foot{margin-top:26px;display:flex;gap:10px;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Offline \u00b7 no network needed</p>
    <h1>Set<em>list</em></h1>
    <p class="lede">Type any vibe. Get a sequenced playlist drawn from a pool tuned to your taste \u2014 your core artists plus adjacent picks you probably haven't heard.</p>
  </header>

  <div class="field">
    <label for="vibe">The vibe</label>
    <input type="text" id="vibe" placeholder="study / foggy dusk picnic / late night drive / cookout">
  </div>
  <div class="chips" id="chips"></div>

  <div class="knobs">
    <div class="knob">
      <label for="len">Length</label>
      <div class="slider-row">
        <input type="range" id="len" min="10" max="60" step="5" value="30">
        <span class="val" id="lenVal">30 trks</span>
      </div>
    </div>
    <div class="knob">
      <label for="disc">Discovery mix</label>
      <div class="slider-row">
        <input type="range" id="disc" min="0" max="90" step="10" value="40">
        <span class="val" id="discVal">40% new</span>
      </div>
    </div>
  </div>

  <div class="actions">
    <button onclick="build()">Build the setlist</button>
    <button class="ghost" onclick="copyList()">Copy tracklist</button>
    <button class="ghost" onclick="copySearch()">Copy for Spotify</button>
    <button class="send" onclick="sendToSpotlistr()">Make it a playlist \u2192</button>
  </div>

  <div id="out"></div>
</div>

// ---- build a vector for every pool track from its tags ----
function vecOfTags(tagStr){
  const v=new Array(DIM).fill(0); let n=0;
  tagStr.split(/\s+/).forEach(t=>{
    if(TAGVEC[t]){ for(let d=0;d<DIM;d++) v[d]+=TAGVEC[t][d]; n++; }
  });
  if(!n) return null;
  for(let d=0;d<DIM;d++) v[d]/=n;
  return v;
}
POOL.forEach(t=>{ t.v = vecOfTags(t.t) || new Array(DIM).fill(.5); });

// ---- resolve one word to a vector ----
function wordVec(w){
  if(LEX[w]) return LEX[w];
  if(TAGVEC[w]) return TAGVEC[w];
  if(SYN[w]){
    const v=new Array(DIM).fill(0); let n=0;
    SYN[w].forEach(t=>{ if(TAGVEC[t]){ for(let d=0;d<DIM;d++) v[d]+=TAGVEC[t][d]; n++; } });
    if(n){ for(let d=0;d<DIM;d++) v[d]/=n; return v; }
  }
  // morphological: strip suffixes and retry
  for(const [suf,rep] of SUFFIX){
    if(w.length>4 && w.endsWith(suf)){
      const base=w.slice(0,w.length-suf.length)+rep;
      if(LEX[base]) return LEX[base];
      if(TAGVEC[base]) return TAGVEC[base];
      if(SYN[base]) return wordVec(base);
    }
  }
  // compound: "rollerblading" contains "blading"/"roller"; "bombpop" etc.
  const keys=Object.keys(LEX);
  for(const k of keys){
    if(k.length>4 && (w.includes(k)||k.includes(w)) && Math.abs(k.length-w.length)<6) return LEX[k];
  }
  // fuzzy prefix against lexicon and tags
  if(w.length>3){
    const pre=w.slice(0,4);
    for(const k of keys){ if(k.startsWith(pre)) return LEX[k]; }
    for(const k of Object.keys(TAGVEC)){ if(k.startsWith(pre)) return TAGVEC[k]; }
  }
  return null;
}

// ---- vibe phrase -> single vector ----
// Blends every recognized word proportionally. The head concept leads, later
// modifiers shade it. When two words CONFLICT on a dimension we blend them
// rather than letting the louder one erase the quieter one, so
// "hurricane on the beach" stays a hurricane that is unmistakably at a beach.
function vibeVector(vibe){
  const raw=vibe.toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/);
  // note where a preposition occurs \u2014 words after it are modifiers
  const PREP={on:1,at:1,in:1,by:1,near:1,during:1,after:1,before:1,with:1,under:1,over:1};
  let seenPrep=false;
  const terms=[];
  raw.forEach(w=>{
    if(!w) return;
    if(PREP[w]){ seenPrep=true; return; }
    if(STOP[w]) return;
    terms.push({w:w, modifier:seenPrep});
  });

  const parts=[], misses=[], hits=[];
  terms.forEach((t,idx)=>{
    const v=wordVec(t.w);
    if(!v){ misses.push(t.w); return; }
    const sal = Math.min(SALIENCE[t.w] || 1, 2.2);
    // head words (before any preposition, and earlier in the phrase) lead
    const pos = t.modifier ? 0.6 : 1.0;
    const decay = 1 / (1 + idx*0.15);
    parts.push({v:v, w:sal*pos*decay, word:t.w});
    hits.push(t.w);
  });

  if(!parts.length) return {v:null, hits:hits, misses:misses};

  const total=parts.reduce((a,p)=>a+p.w,0);
  const out=new Array(DIM);

  for(let d=0; d<DIM; d++){
    // weighted mean on this dimension
    let mean=0; parts.forEach(p=>{ mean += p.v[d]*p.w; });
    mean/=total;

    // do the words disagree on this dimension?
    let lo=1, hi=0;
    parts.forEach(p=>{ if(p.v[d]<lo) lo=p.v[d]; if(p.v[d]>hi) hi=p.v[d]; });
    const spread = hi-lo;

    if(spread > 0.35){
      // CONFLICT \u2014 keep the proportional blend. The dominant word already
      // carries more weight, so the result leans its way while the other
      // still visibly shades it.
      out[d]=mean;
    }else{
      // AGREEMENT \u2014 words point the same way, so let the signal sharpen
      // slightly instead of regressing toward neutral.
      const push = mean>0.5 ? Math.min(hi, mean+0.08) : Math.max(lo, mean-0.08);
      out[d]=push;
    }
  }
  return {v:out, hits:hits, misses:misses, parts_full:parts.map(p=>({word:p.word,v:p.v,w:p.w})), parts:parts.map(p=>({w:p.word,weight:+(p.w/total).toFixed(2)}))};
}

// ---- proportional concept blending ----
// Rank the pool against EACH concept separately, then interleave the lists in
// proportion to each concept's weight. "hurricane on a beach" therefore returns
// mostly storm-intensity tracks with genuine beach warmth threaded through,
// instead of an averaged midpoint that matches neither.
function blendedRanking(vv, need){
  const parts = vv.parts_full || [];
  if(parts.length < 2){
    return POOL.map(t=>({t:t, s:simScore(t.v, vv.v)})).sort((a,b)=>b.s-a.s);
  }
  const total = parts.reduce((a,p)=>a+p.w, 0);
  // per-concept ranked lists
  const lists = parts.map(p=>({
    weight: p.w/total,
    word: p.word,
    items: POOL.map(t=>({t:t, s:simScore(t.v, p.v), src:p.word})).sort((a,b)=>b.s-a.s)
  }));
  const target = Math.max(need*3, 60);
  const quota = lists.map(l=>({l:l, take:Math.max(1, Math.round(target*l.weight))}));
  const seen={}, merged=[];
  let idx=0, guard=0;
  // round-robin weighted draw so proportions hold throughout the list
  while(merged.length<target && guard++<5000){
    let drew=false;
    quota.forEach(q=>{
      const per = Math.max(1, Math.round(q.take/8));
      for(let i=0;i<per;i++){
        const item=q.l.items[q.pos=(q.pos||0)];
        q.pos++;
        if(!item) break;
        const key=item.t.n+'|'+item.t.a;
        if(seen[key]) { i--; if(q.pos>POOL.length) break; continue; }
        seen[key]=1; merged.push(item); drew=true;
        if(merged.length>=target) break;
      }
    });
    if(!drew) break;
  }
  return merged;
}

// ---- similarity ----
function simScore(trackVec, target){
  let dot=0,a=0,b=0;
  for(let d=0;d<DIM;d++){ dot+=trackVec[d]*target[d]; a+=trackVec[d]*trackVec[d]; b+=target[d]*target[d]; }
  const cos = dot/(Math.sqrt(a)*Math.sqrt(b)+1e-9);
  // distance penalty keeps magnitude relevant (energy levels must roughly agree)
  let dist=0; for(let d=0;d<DIM;d++){ const df=trackVec[d]-target[d]; dist+=df*df; }
  return cos - Math.sqrt(dist/DIM)*0.55;
}

// light keyword bonus: how many of the vibe's tag hints a track carries
function score(track, tags){
  if(!tags) return 0;
  let s=0;
  track.t.split(/\s+/).forEach(t=>{ if(tags[t]) s+=tags[t]; });
  return s;
}

// keyword tags still used as a light bonus signal
function wantedTags(vibe){
  const words=vibe.toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(w=>w&&!STOP[w]);
  const tags={};
  words.forEach(w=>{
    if(SYN[w]) SYN[w].forEach((t,i)=>{ tags[t]=(tags[t]||0)+(i===0?1.2:.6); });
    if(POOL_TAGS.indexOf(w)>=0) tags[w]=(tags[w]||0)+1.2;
  });
  return tags;
}

function build(){
  const vibe=document.getElementById('vibe').value.trim();
  const n=parseInt(lenEl.value,10);
  const disc=parseInt(discEl.value,10);
  const out=document.getElementById('out');

  if(!vibe){
    out.innerHTML='<p class="status err">Type a vibe first \u2014 or tap one of the suggestions.</p>';
    document.getElementById('vibe').focus(); return;
  }

  let tags = wantedTags(vibe);
  let vibeRead = null;

  // semantic scoring: position the vibe in 10-dim space, rank tracks by similarity
  const vv = vibeVector(vibe);
  let scored;
  if(vv.v){
    scored = blendedRanking(vv, n).map(x=>({t:x.t, s:x.s + (score(x.t,tags)||0)*0.06 + Math.random()*0.04}));
  }else{
    // nothing recognized \u2014 fall back to a broad, well-rounded spread
    // rather than returning nothing at all
    scored = POOL.map(t=>({t:t, s:(score(t,tags)||0)+Math.random()}))
                 .sort((a,b)=>b.s-a.s);
  }
  vibeRead = vv;

  const wantNew=Math.round(n*disc/100);
  const wantCore=n-wantNew;
  const perArtist={}, picked=[];
  let nCore=0, nNew=0;

  function take(x, isNew){
    const a=x.t.a;
    if((perArtist[a]||0)>=2) return false;
    if(picked.some(p=>p.n===x.t.n && p.a===a)) return false;
    perArtist[a]=(perArtist[a]||0)+1;
    picked.push({n:x.t.n,a:a,type:isNew?'discovery':'core',s:x.s});
    return true;
  }

  scored.forEach(x=>{
    if(picked.length>=n) return;
    const isNew=!x.t.c;
    if(isNew && nNew<wantNew){ if(take(x,true)) nNew++; }
    else if(!isNew && nCore<wantCore){ if(take(x,false)) nCore++; }
  });
  // backfill if one side ran dry
  scored.forEach(x=>{
    if(picked.length>=n) return;
    take(x, !x.t.c);
  });

  if(!picked.length){
    out.innerHTML='<p class="status err">Nothing matched that one. Try words like chill, late, workout, summer, sad, groove, study.</p>';
    return;
  }

  // sequence: gentle ramp \u2014 sort by match strength, then alternate to avoid clumping
  picked.sort((a,b)=>b.s-a.s);
  const seq=[];
  const half=Math.ceil(picked.length/2);
  for(let i=0;i<half;i++){
    seq.push(picked[i]);
    if(picked[half+i]) seq.push(picked[half+i]);
  }

  const title=vibe.replace(/\b\w/g,c=>c.toUpperCase());
  const newCount=seq.filter(t=>t.type==='discovery').length;
  let how = '';
  if(vibeRead && !vibeRead.v){
    how = "Didn't recognize any of that \u2014 here's a general mix. ";
  }
  else if(vibeRead && vibeRead.v){
    const d=vibeRead.v;
    const desc=[];
    desc.push(d[0]>.7?'high energy':d[0]<.3?'low energy':'mid energy');
    if(d[1]>.75) desc.push('warm');
    if(d[2]>.75) desc.push('bright'); else if(d[2]<.3) desc.push('dark');
    if(d[4]>.7) desc.push('in motion');
    if(d[3]>.7) desc.push('nostalgic');
    if(d[9]>.7) desc.push('heavy');
    if(d[7]>.75) desc.push('calm');
    if(d[8]>.7) desc.push('playful');
    how = 'Read as: '+desc.join(', ')+'. ';
    if(vibeRead.parts && vibeRead.parts.length>1){
      how += '[blend: '+vibeRead.parts.map(p=>p.w+' '+Math.round(p.weight*100)+'%').join(', ')+'] ';
    }
    if(vibeRead.misses.length) how += "(Didn't know: "+vibeRead.misses.join(', ')+'.) ';
  }
  current={title:title, note:how+(seq.length-newCount)+' from your lane, '+newCount+' to discover.', tracks:seq};
  render(current);
}

function render(pl){
  const rows=pl.tracks.map(t=>`<li class="track">
      <div><span class="t-name">${esc(t.n)}</span><span class="t-artist">${esc(t.a)}</span></div>
      <span class="badge ${t.type==='discovery'?'b-new':'b-core'}">${t.type==='discovery'?'new':'core'}</span>
    </li>`).join('');
  const newCount=pl.tracks.filter(t=>t.type==='discovery').length;
  document.getElementById('out').innerHTML=`
    <div class="playlist-head">
      <div><h2 class="pl-title">${esc(pl.title)}</h2><p class="pl-note">${esc(pl.note)}</p></div>
      <span class="count">${pl.tracks.length} tracks \u00b7 ${newCount} new</span>
    </div>
    <ol>${rows}</ol>
    <div class="foot">
      <button class="ghost" onclick="build()">Reshuffle</button>
      <button class="ghost" onclick="copyList()">Copy tracklist</button>
      <button class="send" onclick="sendToSpotlistr()">Make it a playlist \u2192</button>
    </div>`;
}

function clip(t){
  const ta=document.createElement('textarea');
  ta.value=t; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
}
function sendToSpotlistr(){
  if(!current){ alert('Build a setlist first.'); return; }
  // Spotlistr's textbox importer wants one "Track Artist" line per song
  const lines = current.tracks.map(t=>t.n+' '+t.a).join("\n");
  clip(lines);
  const note=document.createElement('p');
  note.className='send-note';
  note.innerHTML='Tracklist copied. Spotlistr is opening \u2014 log in with Spotify, '
    +'paste into the box, review the matches, and hit create. '
    +'<a href="https://www.spotlistr.com/convert/textbox-to-spotify" target="_blank" rel="noopener">'
    +'Open Spotlistr manually</a> if the tab was blocked.';
  const foot=document.querySelector('.foot');
  if(foot && !document.querySelector('.send-note')) foot.parentNode.appendChild(note);
  window.open('https://www.spotlistr.com/convert/textbox-to-spotify','_blank','noopener');
}

function copyList(){ if(current) clip(current.title+"\n\n"+current.tracks.map((t,i)=>`${i+1}. ${t.n} \u2014 ${t.a}`).join("\n")); }
function copySearch(){ if(current) clip(current.tracks.map(t=>`${t.n} ${t.a}`).join("\n")); }

document.getElementById('vibe').addEventListener('keydown',e=>{if(e.key==='Enter')build();});
</script>
</body>
</html>
